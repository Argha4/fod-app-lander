<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon | Supermarket App</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>

        /* --- FOOTER & SOCIAL LINKS --- */
        .footer-container {
            margin-top: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px; /* Space between the text and the buttons */
            width: 100%;
        }

        .footer-text {
            font-size: 0.95rem;
            color: #1E293B; /* Deep slate color to match a blue theme */
            line-height: 1.6;
            margin-bottom: 0;
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 30px; /* This acts as your "tab spacing" between logos */
        }

        .social-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 50px;
            height: 50px;
            background-color: var(--primary-color); /* Deep Navy Blue */
            border-radius: 50%; /* Perfect circles */
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(30, 58, 138, 0.2);
        }

        .social-btn svg {
            width: 22px;
            height: 22px;
            fill: #FFFFFF; /* Makes the logos white inside the blue circle */
        }

        /* Hover Effect for interaction */
        .social-btn:hover {
            transform: translateY(-5px); /* Bounces up slightly when tapped */
            background-color: #3B82F6; /* Brightens up to a lighter blue */
            box-shadow: 0 8px 15px rgba(59, 130, 246, 0.3);
        }

        /* --- BENGALI TYPOGRAPHY --- */
        .bengali-text {
            font-family: 'Hind Siliguri', sans-serif;
            line-height: 1.4; /* Crucial for Bengali Matra spacing */
            letter-spacing: normal; /* Removes English letter-spacing to prevent broken characters */
        }

        /* 1. YOUR FIGMA COLORS */
        :root {
            --primary-color: #101042; 
            --text-dark: #052557;     
            --text-light: #737373;    
            --bg-color: #f0e8d5;
            --button-color: #FA4A0C;
        }

        /* 2. BASE CLEANUP */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif; 
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-dark);
            /* Centers everything on the screen */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        /* 3. MOBILE CONTAINER */
        .mobile-container {
            display: flex;
            flex-direction: column; /* Stacks text on top of image */
            align-items: center;    /* Centers everything horizontally */
            text-align: center;
            padding: 40px 20px;
            width: 100%;
            max-width: 450px;       /* Keeps it phone-sized even on big screens */
            gap: 30px;              /* Space between text and image */
        }

        /* --- NAVIGATION BAR --- */
        .top-navbar {
            display: flex;
            justify-content: space-between; /* Pushes logo left, text right */
            align-items: center; /* Vertically centers them */
            width: 100%;
            margin-bottom: 10px; /* Pushes the main text down */
            padding: 7px 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            background-color: var(--primary-color);
        }

        .nav-logo {
            height: 108px; /* Adjust this to match your Figma design */
            width: auto;  /* Keeps the logo from stretching ugly */
        }

        .nav-title {
            height: 74px; /* Adjust this to match your Figma design */
            width: auto;  /* Keeps the logo from stretching ugly */
        }

        /* 4. TEXT STYLING */
        .badge {
            border-radius: 30px;
            background-color: var(--button-color);
            color: white;
            padding: 8px 16px;
            font-family: Montserrat;
            font-size: 24px;
            font-style: normal;
            font-weight: 700;
            line-height: 36px; /* 150% */
            display: inline-block;
            margin-top: 15px;
            margin-bottom: 20px;
        }

        h1 {
          font-family: Montserrat;
          font-size: 36px;
          font-style: normal;
          font-weight: 700;
          margin-bottom: 15px;
          letter-spacing: 1.5px;
        }

        p {
            color: var(--text-light);
            font-family: Montserrat;
            font-size: 24px;
            font-style: normal;
            font-weight: 500;
            line-height: 38px; /* 158.333% */
            letter-spacing: 0.2px;
            margin-bottom: 20px;
        }

        f {
            color: var(--text-light);
            font-family: Montserrat;
            font-size: 14px;
            font-style: normal;
            font-weight: 500;
            line-height: 18px; /* 158.333% */
            letter-spacing: 0.2px;
            margin-bottom: 10px;
        }

/* --- 5. DUAL 3D PHONE SHOWCASE --- */
        
        .dual-showcase {
            width: 100%;
            display: flex;
            justify-content: center;
            perspective: 1200px; /* The 3D Camera distance */
            margin-top: 20px;
            padding-bottom: 80px; 
        }

        .phone-wrapper {
            transform-style: preserve-3d;
        }

        /* THE LEFT PHONE: Turned Right */
        .left-phone {
            /* Turns right (20deg), tilts back slightly (5deg) */
            transform: rotateY(30deg) rotateX(10deg);
            z-index: 2; /* Keeps it in front */
        }

        /* THE RIGHT PHONE: Turned Left & Pushed Down */
        .right-phone {
            /* Turns left (-20deg), tilts back (5deg), pushes down (50px), shifts left to overlap (-40px) */
            transform: rotateY(-20deg) rotateX(5deg) translateY(50px) translateX(-15px);
            z-index: 1; /* Puts it slightly behind the left phone */
        }

        /* The Hardware Frame (Slightly narrower so two fit on screen) */
        .css-phone-frame {
            width: 150px;  /* Scaled down from 260px */
            height: 320px; /* Scaled down from 550px */
            background-color: #111;
            border-radius: 25px;
            padding: 6px;
            position: relative;
            
            /* Dynamic shadow that adds depth */
            box-shadow: 
                -15px 25px 30px rgba(0, 0, 0, 0.2), 
                inset 0px 0px 8px rgba(255, 255, 255, 0.2); 
        }

        /* Right Phone needs a slightly different shadow angle */
        .right-phone .css-phone-frame {
            box-shadow: 
                15px 25px 30px rgba(0, 0, 0, 0.2), 
                inset 0px 0px 8px rgba(255, 255, 255, 0.2);
        }

        /* The Camera Notch */
        .phone-notch {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            width: 45px; /* Scaled down */
            height: 14px; /* Scaled down */
            background-color: #000;
            border-radius: 10px;
            z-index: 10; 
        }

        /* The App Screen Image */
        .app-screen {
            width: 100%;
            height: 100%;
            object-fit: cover; 
            border-radius: 25px; 
            background-color: var(--bg-color); 
        }
    </style>
</head>

    </div>

</body>
